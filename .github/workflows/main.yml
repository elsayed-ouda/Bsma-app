name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project files from ZIP
        run: |
          unzip -q BasmahApp.zip
          rm BasmahApp.zip
          echo "=== Contents after unzip ==="
          ls -la

      - name: Verify gradlew location
        run: |
          if [ -f "BasmahApp/gradlew" ]; then
            echo "✅ gradlew found inside BasmahApp/"
          elif [ -f "gradlew" ]; then
            echo "✅ gradlew found in root"
          else
            echo "❌ gradlew not found!"
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission and Build
        run: |
          cd BasmahApp
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: BasmahApp/app/build/outputs/apk/debug/app-debug.apk
